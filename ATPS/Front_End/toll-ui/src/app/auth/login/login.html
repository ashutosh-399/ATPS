<div class="container bg-image min-vh-100 min-vw-100">
  <div class="row justify-content-center">
    <div class="container-fluid d-flex flex-column justify-content-center col-md-4 bg-white mt-5 bg-opacity-75 rounded-3">
      <h3 class="text-center mb-4 mt-4">Login</h3>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <div class="form-group mb-2">
          <label>Email<span class="text-danger">*</span></label>
          <input type="email" class="form-control" formControlName="email" placeholder="Enter your email">
        </div>

        <div class="form-group mb-2">
          <label>Password<span class="text-danger">*</span></label>
          <input type="password" class="form-control" formControlName="password" placeholder="Enter your password">
        </div>

        <div *ngIf="errorMessage" class="alert alert-danger">
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
        <button routerLink="/auth/signup" class="btn btn-secondary w-100 mt-3 mb-4">Register</button>
      </form>
    </div>
  </div>
</div>
