<div class="container min-vh-100 min-vw-100 bg-image">
  <div>
    <div class="row justify-content-center">
      <div class="col-md-5 mt-4 bg-white bg-opacity-75 rounded-3 card p-4">

        <h3 class="text-center mb-3 mt-2">Create Account</h3>

        <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

          <div class="form-group mb-2">
            <label>Name<span class="text-danger">*</span></label>
            <input type="text" class="form-control" formControlName="name" placeholder="Enter your name">
          </div>

          <div class="form-group mb-2">
            <label>Email<span class="text-danger">*</span></label>
            <input type="email" class="form-control" formControlName="email" placeholder="Enter your email">
          </div>

          <div class="form-group mb-2">
            <label>Password<span class="text-danger">*</span></label>
            <input type="password" class="form-control" formControlName="password" placeholder="Enter your password">
          </div>

          <div class="form-group mb-2">
            <label>Mobile<span class="text-danger">*</span></label>
            <input type="text" class="form-control" formControlName="mobile" placeholder="Enter your phone">
          </div>

          <div *ngIf="successMessage" class="alert alert-success">
            {{ successMessage }}
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <button type="submit" class="btn btn-success w-100 mt-2 mb-4">Register</button>

        </form>

      </div>
    </div>
  </div>
</div>
